<template>
    <!-- .Login 3 (node: 12036:89655) -->
    <div class="login-03">

        <!-- .Utility / Title (node: 12036:89656) -->
        <div class="utility-title">
            <div class="logo-and-title">
                <!-- Utility / Logo (node: 6709:24422) -->
                <div class="utility-logo">
                    <div class="logo-mark">
                        <img alt="" src={logoMarkUrl} class="logo-mark-img">
                    </div>
                    <div class="logo-wordmark">
                        <img alt="" src={logoWordmarkUrl} class="logo-wordmark-img">
                    </div>
                </div>
                <!-- Container: Title + Subtitle -->
                <div class="title-container">
                    <div class="title-text">
                        <p>Login 03</p>
                    </div>
                    <div class="subtitle-text">
                        <p>A login page with a muted background color</p>
                    </div>
                </div>
            </div>
            <a class="documentation-link" onclick={handleDocumentationClick}>Documentation</a>
        </div>

        <!-- Main content (node: 12036:89657) -->
        <div class="main-content">
            <!-- Login 03 Block (node: 6962:47928) -->
            <div class="login-03-block">

                <!-- .Sidebar Popover Trigger — brand (node: 6962:47526) -->
                <div class="brand-trigger">
                    <div class="brand-logo">
                        <div class="brand-logo-icon">
                            <img alt="" src={commandIconUrl} class="brand-logo-icon-img">
                        </div>
                    </div>
                    <p class="brand-name">{brandName}</p>
                </div>

                <!-- Card (node: 6962:47528) -->
                <div class="card">
                    <!-- Card Header (node: 2761:23511) -->
                    <div class="card-header">
                        <p class="card-title">{cardTitle}</p>
                        <p class="card-description">{cardDescription}</p>
                    </div>

                    <!-- Card Content (node: 6962:47690) -->
                    <div class="card-content">
                        <!-- Login with Apple button (node: 6962:47533) -->
                        <div class="btn-social" onclick={handleLoginWithAppleClick} role="button" tabindex="0">
                            <div class="btn-social-icon">
                                <img alt="" src={appleIconUrl} class="btn-social-icon-img">
                            </div>
                            <p class="btn-social-label">Login with Apple</p>
                        </div>

                        <!-- Login with Google button (node: 6962:47812) -->
                        <div class="btn-social" onclick={handleLoginWithGoogleClick} role="button" tabindex="0">
                            <div class="btn-social-icon">
                                <img alt="" src={googleIconUrl} class="btn-social-icon-img">
                            </div>
                            <p class="btn-social-label">Login with Google</p>
                        </div>

                        <!-- Or continue with (node: 6962:47534) -->
                        <div class="or-separator">
                            <div class="separator">
                                <div class="separator-line"></div>
                            </div>
                            <p class="or-text">Or continue with</p>
                            <div class="separator">
                                <div class="separator-line"></div>
                            </div>
                        </div>

                        <!-- Authentication Card Content (node: 6962:47842) -->
                        <div class="auth-fields">
                            <!-- Email input (node: I6962:47842;6752:5111) -->
                            <div class="input-group">
                                <div class="input-label-row">
                                    <p class="input-label">Email</p>
                                </div>
                                <div class="input-field">
                                    <p class="input-placeholder">m@example.com</p>
                                </div>
                            </div>

                            <!-- Password input (node: I6962:47842;6752:5112) -->
                            <div class="input-group">
                                <div class="input-label-row">
                                    <p class="input-label">Password</p>
                                    <a class="forgot-password-link" onclick={handleForgotPasswordClick}>Forgot your password?</a>
                                </div>
                                <div class="input-field"></div>
                            </div>
                        </div>

                        <!-- Login button (node: 6965:46467) -->
                        <div class="btn-primary" onclick={handleLoginClick} role="button" tabindex="0">
                            <p class="btn-primary-label">Login</p>
                        </div>

                        <!-- Sign up text (node: 6962:47539) -->
                        <p class="signup-text">
                            <span>Don't have an account? </span>
                            <a class="signup-link" onclick={handleSignUpClick}>Sign up</a>
                        </p>
                    </div>
                </div>

                <!-- Terms text (node: 6962:47860) -->
                <p class="terms-text">
                    <span>By clicking continue, you agree to our </span>
                    <a class="terms-link">Terms of Service</a>
                    <span> and </span>
                    <a class="terms-link">Privacy Policy</a>
                    <span>.</span>
                </p>
            </div>
        </div>

        <!-- .Utility / Footer (node: 7052:51648) -->
        <div class="utility-footer">
            <!-- Logo & Divider (node: 7954:65368) -->
            <div class="footer-divider-row">
                <div class="separator">
                    <div class="separator-line"></div>
                </div>
                <div class="footer-cloud">
                    <img alt="" src={footerCloudUrl} class="footer-cloud-img">
                </div>
                <div class="separator">
                    <div class="separator-line"></div>
                </div>
            </div>
            <!-- Links (node: 7954:75172) -->
            <div class="footer-links-row">
                <div class="footer-copyright">
                    <p>&copy; Salesforce 2025</p>
                </div>
                <div class="footer-link" onclick={handleDocsClick} role="button" tabindex="0">
                    <div class="footer-link-icon">
                        <img alt="" src={docsIconUrl} class="footer-link-icon-img">
                    </div>
                    <span class="footer-link-label">Docs</span>
                </div>
                <div class="footer-link" onclick={handleWebsiteClick} role="button" tabindex="0">
                    <div class="footer-link-icon">
                        <img alt="" src={globeIconUrl} class="footer-link-icon-img">
                    </div>
                    <span class="footer-link-label">Website</span>
                </div>
                <div class="footer-link" onclick={handleSupportClick} role="button" tabindex="0">
                    <div class="footer-link-icon">
                        <img alt="" src={supportIconUrl} class="footer-link-icon-img">
                    </div>
                    <span class="footer-link-label">Support</span>
                </div>
            </div>
        </div>

    </div>
</template>
